<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坦克大战 - Tank Battle</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Courier New', monospace;
    user-select: none;
  }
  #gameContainer {
    position: relative;
    border: 3px solid #333;
    box-shadow: 0 0 40px rgba(0,255,0,0.15), 0 0 80px rgba(0,255,0,0.05);
  }
  canvas { display: block; background: #111; }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    color: #0f0;
    font-size: 16px;
    font-weight: bold;
    text-shadow: 0 0 10px rgba(0,255,0,0.5);
  }
  #ui span { margin: 0 15px; }
  #startScreen, #gameOver {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.88);
  }
  #startScreen {
    display: flex;
  }
  #startScreen h1 {
    color: #4af;
    font-size: 42px;
    font-weight: bold;
    text-shadow: 0 0 30px rgba(68,170,255,0.7), 0 0 60px rgba(68,170,255,0.3);
    margin-bottom: 8px;
    letter-spacing: 6px;
  }
  #startScreen .subtitle {
    color: #888;
    font-size: 14px;
    margin-bottom: 30px;
  }
  #startScreen .controls {
    color: #aaa;
    font-size: 14px;
    line-height: 2;
    text-align: left;
    margin-bottom: 30px;
    border: 1px solid #333;
    padding: 16px 24px;
  }
  #startScreen .controls span {
    color: #0f0;
  }
  #startScreen button,
  #gameOver button {
    margin-top: 10px;
    padding: 12px 40px;
    font-size: 18px;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    background: transparent;
    color: #0f0;
    border: 2px solid #0f0;
    cursor: pointer;
    pointer-events: auto;
    transition: all 0.2s;
    animation: pulse 2s infinite;
  }
  #startScreen button:hover,
  #gameOver button:hover {
    background: #0f0;
    color: #000;
    box-shadow: 0 0 20px rgba(0,255,0,0.4);
  }
  #gameOver {
    color: #f33;
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 20px rgba(255,0,0,0.7);
  }
  #gameOver button {
    color: #f66;
    border-color: #f66;
    animation: none;
  }
  #gameOver button:hover {
    background: #f66;
    color: #000;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<div id="gameContainer">
  <canvas id="game"></canvas>
  <div id="ui">
    <span id="score">🏆 分数: 0</span>
    <span id="level">📊 波次: 1</span>
    <span id="lives">❤️ 生命: 3</span>
  </div>
  <div id="startScreen">
    <h1>坦 克 大 战</h1>
    <div class="subtitle">TANK BATTLE</div>
    <div class="controls">
      <span>W A S D</span> 或 <span>↑ ↓ ← →</span> 移动<br>
      <span>空格</span> 或 <span>J</span> 射击
    </div>
    <button id="startBtn" onclick="startGame()">▶  开 始 游 戏</button>
  </div>
  <div id="gameOver">
    <div id="finalScore">最终得分: 0</div>
    <div id="kills">击杀: 0</div>
    <button onclick="restartGame()">🔄 重新开始</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Canvas size
const COLS = 28;
const ROWS = 22;
const CELL = 32;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// Directions
const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
const DX = [0, 1, 0, -1];
const DY = [-1, 0, 1, 0];

// Game state
let score = 0;
let kills = 0;
let lives = 3;
let wave = 1;
let gameOver = false;
let gameStarted = false;
let gameLoopId = null;

// Tanks
let player = null;
let enemies = [];
let bullets = [];
let particles = [];
let walls = [];
let powerUps = [];

// Input
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; e.preventDefault(); });

// Audio context for sound effects
let audioCtx = null;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playSound(freq, duration, type = 'square', vol = 0.05) {
  if (!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
  gain.gain.setValueAtTime(vol, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  osc.stop(audioCtx.currentTime + duration);
}

function sfxShoot() { playSound(200, 0.1, 'square', 0.04); }
function sfxHit() { playSound(80, 0.2, 'sawtooth', 0.06); }
function sfxExplosion() { playSound(40, 0.35, 'sawtooth', 0.08); }
function sfxPowerUp() { playSound(600, 0.15, 'square', 0.05); playSound(800, 0.15, 'square', 0.04); }
function sfxPlayerHit() { playSound(60, 0.4, 'sawtooth', 0.1); }
function sfxWaveStart() { playSound(300, 0.1, 'square', 0.04); playSound(500, 0.15, 'square', 0.05); }

// Map generation
function generateMap() {
  walls = [];
  // Border walls
  for (let x = 0; x < COLS; x++) {
    walls.push({ x, y: 0, hp: Infinity });
    walls.push({ x, y: ROWS - 1, hp: Infinity });
  }
  for (let y = 1; y < ROWS - 1; y++) {
    walls.push({ x: 0, y, hp: Infinity });
    walls.push({ x: COLS - 1, y, hp: Infinity });
  }
  // Random internal walls
  for (let x = 1; x < COLS - 1; x++) {
    for (let y = 1; y < ROWS - 1; y++) {
      if (Math.random() < 0.08) {
        // Don't block center area (player spawn)
        const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
        if (Math.abs(x - cx) < 3 && Math.abs(y - cy) < 3) continue;
        walls.push({ x, y, hp: 2 });
      }
    }
  }
}

function createTank(x, y, dir, color, isPlayer = false) {
  return {
    x, y, dir,
    color,
    isPlayer,
    speed: isPlayer ? 0.0055 : 0.002 + wave * 0.0005,
    size: 0.85,
    shootCooldown: 0,
    shootRate: isPlayer ? 300 : 1500 - wave * 50,
    hp: isPlayer ? 1 : 1 + Math.floor(wave / 3),
    maxHp: isPlayer ? 1 : 1 + Math.floor(wave / 3),
    powerLevel: 1,
    powerTimer: 0,
    aiTimer: 0,
    aiNewDir: Math.random() * 100,
  };
}

function spawnPowerUp() {
  const types = ['speed', 'rapid', 'multiShot', 'shield'];
  const type = types[Math.floor(Math.random() * types.length)];
  let px, py;
  do {
    px = Math.floor(Math.random() * (COLS - 2)) + 1;
    py = Math.floor(Math.random() * (ROWS - 2)) + 1;
  } while (walls.some(w => w.x === px && w.y === py));
  powerUps.push({ x: px, y: py, type, timer: 600 });
}

function initPlayer() {
  const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
  player = createTank(cx, cy, DIR.UP, '#4aff4a', true);
  player.hp = 1;
  player.powerLevel = 1;
  player.powerTimer = 0;
}

function spawnWave() {
  enemies = [];
  powerUps = [];
  initAudio();
  sfxWaveStart();
  const count = 3 + wave * 2;
  for (let i = 0; i < count; i++) {
    let ex, ey;
    const side = Math.floor(Math.random() * 4);
    if (side === 0) { ex = Math.floor(Math.random() * (COLS - 2)) + 1; ey = 1; }
    else if (side === 1) { ex = COLS - 2; ey = Math.floor(Math.random() * (ROWS - 2)) + 1; }
    else if (side === 2) { ex = Math.floor(Math.random() * (COLS - 2)) + 1; ey = ROWS - 2; }
    else { ex = 1; ey = Math.floor(Math.random() * (ROWS - 2)) + 1; }
    // Ensure not overlapping walls
    if (walls.some(w => w.x === ex && w.y === ey)) { i--; continue; }
    const colors = ['#ff4444', '#ff8844', '#ff44aa', '#ff4444', '#aa44ff', '#ff6644'];
    enemies.push(createTank(ex, ey, DIR.DOWN, colors[i % colors.length], false));
  }
}

// Collision detection
function collidesWithWall(x, y, bw = 0.4) {
  const left = x - bw;
  const right = x + bw;
  const top = y - bw;
  const bottom = y + bw;
  for (const w of walls) {
    if (right > w.x - 0.35 && left < w.x + 0.35 &&
        bottom > w.y - 0.35 && top < w.y + 0.35) {
      return w;
    }
  }
  return null;
}

function collidesWithTank(x, y, ignore) {
  const bw = 0.38;
  if (ignore !== player && player && player.hp > 0) {
    if (Math.abs(x - player.x) < bw * 2 && Math.abs(y - player.y) < bw * 2) return player;
  }
  for (const e of enemies) {
    if (e === ignore || e.hp <= 0) continue;
    if (Math.abs(x - e.x) < bw * 2 && Math.abs(y - e.y) < bw * 2) return e;
  }
  return null;
}

function isWalkable(x, y, ignoreTank = null) {
  return !collidesWithWall(x, y) && !collidesWithTank(x, y, ignoreTank);
}

// Bullets
function fireBullet(tank) {
  const bx = tank.x + DX[tank.dir] * 0.6;
  const by = tank.y + DY[tank.dir] * 0.6;
  if (collidesWithWall(bx, by, 0.15)) return;
  bullets.push({
    x: bx, y: by,
    dir: tank.dir,
    speed: 0.18,
    isPlayer: tank.isPlayer,
    damage: 1,
  });
  if (tank.isPlayer) sfxShoot();
  else playSound(120, 0.08, 'square', 0.02);
}

function fireMultiShot(tank) {
  const count = tank.powerLevel >= 2 ? 3 : 1;
  for (let i = -1; i <= 1; i += 2) {
    if (count === 1 && i !== 0) continue;
    const spreadDir = ((tank.dir + (count > 1 ? i : 0)) + 4) % 4;
    const bx = tank.x + DX[spreadDir] * 0.55;
    const by = tank.y + DY[spreadDir] * 0.55;
    if (!collidesWithWall(bx, by, 0.12)) {
      bullets.push({ x: bx, y: by, dir: spreadDir, speed: 0.18, isPlayer: tank.isPlayer, damage: 1 });
    }
  }
  // center bullet
  const bx = tank.x + DX[tank.dir] * 0.55;
  const by = tank.y + DY[tank.dir] * 0.55;
  if (!collidesWithWall(bx, by, 0.12)) {
    bullets.push({ x: bx, y: by, dir: tank.dir, speed: 0.18, isPlayer: tank.isPlayer, damage: 1 });
  }
  if (tank.isPlayer) sfxShoot();
}

function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.02 + Math.random() * 0.06;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 0.4 + Math.random() * 0.5,
      maxLife: 0.4 + Math.random() * 0.5,
      color,
      size: 2 + Math.random() * 3,
    });
  }
}

// Update
function update(dt) {
  if (gameOver || !gameStarted || !player) return;
  dt = Math.min(dt, 50);

  // Player movement
  if (player.hp > 0) {
    let targetDir = -1;
    if (keys['ArrowUp'] || keys['w'] || keys['W']) targetDir = DIR.UP;
    else if (keys['ArrowDown'] || keys['s'] || keys['S']) targetDir = DIR.DOWN;
    else if (keys['ArrowLeft'] || keys['a'] || keys['A']) targetDir = DIR.LEFT;
    else if (keys['ArrowRight'] || keys['d'] || keys['D']) targetDir = DIR.RIGHT;

    if (targetDir >= 0) {
      player.dir = targetDir;
      const nx = player.x + DX[player.dir] * player.speed * dt;
      const ny = player.y + DY[player.dir] * player.speed * dt;
      if (isWalkable(nx, ny, player)) {
        player.x = nx;
        player.y = ny;
      } else if (DX[player.dir] !== 0 && isWalkable(nx, player.y, player)) {
        player.x = nx;
      } else if (DY[player.dir] !== 0 && isWalkable(player.x, ny, player)) {
        player.y = ny;
      }
    }

    // Shooting
    player.shootCooldown -= dt;
    if ((keys[' '] || keys['j'] || keys['J']) && player.shootCooldown <= 0) {
      if (player.powerLevel >= 2) fireMultiShot(player);
      else if (player.powerLevel >= 1) fireBullet(player);
      player.shootCooldown = player.shootRate;
    }
  }

  // Update enemies
  for (const e of enemies) {
    if (e.hp <= 0) continue;

    // AI: patrol the whole map, occasionally chase player
    e.aiTimer -= dt;
    if (e.aiTimer <= 0) {
      e.aiTimer = 50 + Math.random() * 120;
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const distToPlayer = Math.abs(dx) + Math.abs(dy);

      if (distToPlayer < 8 && Math.random() < 0.35) {
        if (Math.abs(dx) > Math.abs(dy)) {
          e.dir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
          e.dir = dy > 0 ? DIR.DOWN : DIR.UP;
        }
      } else if (Math.random() < 0.7) {
        e.dir = Math.floor(Math.random() * 4);
      }
    }

    // Move forward with wall avoidance
    const nx = e.x + DX[e.dir] * e.speed * dt;
    const ny = e.y + DY[e.dir] * e.speed * dt;
    if (isWalkable(nx, ny, e)) {
      e.x = nx;
      e.y = ny;
    } else {
      e.dir = Math.floor(Math.random() * 4);
    }

    // Enemy shooting
    e.shootCooldown -= dt;
    if (e.shootCooldown <= 0) {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const distToPlayer = Math.abs(dx) + Math.abs(dy);
      const facingPlayer =
        (e.dir === DIR.UP && dy < 0 && Math.abs(dx) < 3) ||
        (e.dir === DIR.DOWN && dy > 0 && Math.abs(dx) < 3) ||
        (e.dir === DIR.LEFT && dx < 0 && Math.abs(dy) < 3) ||
        (e.dir === DIR.RIGHT && dx > 0 && Math.abs(dy) < 3);

      if (facingPlayer && distToPlayer < 10 && Math.random() < 0.5) {
        fireBullet(e);
        e.shootCooldown = e.shootRate;
      } else if (Math.random() < 0.06) {
        fireBullet(e);
        e.shootCooldown = e.shootRate;
      }
    }
  }

  // Update bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += DX[b.dir] * b.speed * dt;
    b.y += DY[b.dir] * b.speed * dt;

    // Hit wall
    const wall = collidesWithWall(b.x, b.y, 0.1);
    if (wall) {
      if (wall.hp < Infinity) {
        wall.hp -= b.damage;
        if (wall.hp <= 0) {
          walls.splice(walls.indexOf(wall), 1);
          spawnParticles(wall.x, wall.y, '#888', 6);
        }
      }
      spawnParticles(b.x, b.y, '#ff8', 4);
      bullets.splice(i, 1);
      continue;
    }

    // Off screen
    if (b.x < 0 || b.x >= COLS || b.y < 0 || b.y >= ROWS) {
      bullets.splice(i, 1);
      continue;
    }

    // Hit tank
    if (b.isPlayer) {
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        if (Math.abs(b.x - e.x) < 0.4 && Math.abs(b.y - e.y) < 0.4) {
          e.hp -= b.damage;
          spawnParticles(b.x, b.y, e.color, 8);
          bullets.splice(i, 1);
          if (e.hp <= 0) {
            sfxExplosion();
            spawnParticles(e.x, e.y, e.color, 20);
            score += 100;
            kills++;
            const r = Math.random();
            if (r < 0.15) spawnPowerUp();
          } else {
            sfxHit();
          }
          updateUI();
          break;
        }
      }
    } else {
      if (player.hp > 0 && Math.abs(b.x - player.x) < 0.4 && Math.abs(b.y - player.y) < 0.4) {
        spawnParticles(b.x, b.y, '#f44', 8);
        bullets.splice(i, 1);
        if (player.powerTimer > 0) {
          // Shield absorbs
          player.powerTimer = 0;
          player.powerLevel = Math.max(1, player.powerLevel - 1);
          spawnParticles(player.x, player.y, '#4af', 12);
        } else {
          sfxPlayerHit();
          lives--;
          updateUI();
          if (lives <= 0) {
            player.hp = 0;
            spawnParticles(player.x, player.y, '#4f4', 30);
            endGame();
          } else {
            // Respawn with invincibility
            initPlayer();
            player.powerTimer = 2000; // temporary shield
            spawnParticles(player.x, player.y, '#4af', 12);
          }
        }
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= dt / 1000;
    if (p.life <= 0) particles.splice(i, 1);
    else {
      p.x += p.vx;
      p.y += p.vy;
    }
  }

  // Update power-ups
  for (let i = powerUps.length - 1; i >= 0; i--) {
    const pu = powerUps[i];
    pu.timer -= dt;
    if (pu.timer <= 0) { powerUps.splice(i, 1); continue; }
    if (player.hp > 0 && Math.abs(pu.x - player.x) < 0.5 && Math.abs(pu.y - player.y) < 0.5) {
      sfxPowerUp();
      spawnParticles(pu.x, pu.y, '#ff0', 10);
      if (pu.type === 'speed') player.speed = Math.min(0.009, player.speed + 0.002);
      else if (pu.type === 'rapid') player.shootRate = Math.max(80, player.shootRate - 60);
      else if (pu.type === 'multiShot') { player.powerLevel = Math.min(3, player.powerLevel + 1); player.powerTimer = 15000; }
      else if (pu.type === 'shield') player.powerTimer = 15000;
      powerUps.splice(i, 1);
      score += 50;
      updateUI();
    }
  }

  // Power-up timer for player
  if (player.powerTimer > 0) {
    player.powerTimer -= dt;
    if (player.powerTimer <= 0) {
      player.powerLevel = 1;
      player.speed = 0.0055;
      player.shootRate = 300;
    }
  }

  // Check wave completion
  if (enemies.every(e => e.hp <= 0)) {
    wave++;
    updateUI();
    generateMap();
    initPlayer();
    spawnWave();
  }
}

function endGame() {
  gameOver = true;
  document.getElementById('gameOver').style.display = 'flex';
  document.getElementById('finalScore').textContent = '最终得分: ' + score;
  document.getElementById('kills').textContent = '击杀: ' + kills;
}

function updateUI() {
  document.getElementById('score').textContent = '🏆 分数: ' + score;
  document.getElementById('level').textContent = '📊 波次: ' + wave;
  document.getElementById('lives').textContent = '❤️ 生命: ' + lives;
}

// Render
function drawTank(tank) {
  ctx.save();
  const cx = tank.x * CELL;
  const cy = tank.y * CELL;
  ctx.translate(cx, cy);
  const angle = tank.dir * Math.PI / 2;
  ctx.rotate(angle);

  const s = CELL * tank.size * 0.45;

  // Tracks
  ctx.fillStyle = '#222';
  ctx.fillRect(-s, -s * 0.7, s * 2, s * 0.3);
  ctx.fillRect(-s, s * 0.4, s * 2, s * 0.3);

  // Body
  ctx.fillStyle = tank.color;
  ctx.fillRect(-s * 0.7, -s * 0.7, s * 1.4, s * 1.4);

  // Turret
  ctx.fillStyle = tank.isPlayer ? '#3a3' : '#c33';
  ctx.fillRect(-s * 0.2, -s * 1.15, s * 0.4, s * 0.75);

  // Barrel
  ctx.fillStyle = '#888';
  ctx.fillRect(-s * 0.1, -s * 1.7, s * 0.2, s * 0.8);

  // Power indicator (glow)
  if (tank.powerTimer > 0) {
    ctx.strokeStyle = tank.isPlayer ? 'rgba(100,200,255,0.6)' : 'rgba(255,100,100,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, s * 1.3, 0, Math.PI * 2);
    ctx.stroke();
  }

  // HP bar for enemies
  if (!tank.isPlayer && tank.maxHp > 1) {
    const barWidth = CELL * 0.6;
    const barHeight = 4;
    ctx.rotate(-angle); // unrotate for HP bar
    ctx.fillStyle = '#333';
    ctx.fillRect(-barWidth / 2, -s * 1.3 - 8, barWidth, barHeight);
    ctx.fillStyle = '#f33';
    ctx.fillRect(-barWidth / 2, -s * 1.3 - 8, barWidth * (tank.hp / tank.maxHp), barHeight);
  }

  ctx.restore();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Grid lines (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * CELL, 0); ctx.lineTo(x * CELL, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * CELL); ctx.lineTo(canvas.width, y * CELL); ctx.stroke();
  }

  // Walls
  for (const w of walls) {
    const cx = w.x * CELL, cy = w.y * CELL;
    if (w.hp === Infinity) {
      // Indestructible border
      ctx.fillStyle = '#555';
      ctx.fillRect(cx - CELL * 0.45, cy - CELL * 0.45, CELL * 0.9, CELL * 0.9);
      ctx.fillStyle = '#444';
      ctx.fillRect(cx - CELL * 0.35, cy - CELL * 0.35, CELL * 0.7, CELL * 0.7);
    } else {
      const alpha = w.hp / 2;
      ctx.fillStyle = `rgba(180,130,70,${alpha})`;
      ctx.fillRect(cx - CELL * 0.45, cy - CELL * 0.45, CELL * 0.9, CELL * 0.9);
      ctx.strokeStyle = '#654';
      ctx.lineWidth = 1;
      ctx.strokeRect(cx - CELL * 0.45, cy - CELL * 0.45, CELL * 0.9, CELL * 0.9);
    }
  }

  // Power-ups
  for (const pu of powerUps) {
    const px = pu.x * CELL, py = pu.y * CELL;
    const pulse = Math.sin(Date.now() / 200) * 0.2 + 0.8;
    ctx.globalAlpha = pulse;
    const colors = { speed: '#ff0', rapid: '#f0f', multiShot: '#0ff', shield: '#4af' };
    ctx.fillStyle = colors[pu.type];
    ctx.beginPath();
    ctx.arc(px, py, CELL * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    const labels = { speed: '⚡', rapid: '🔥', multiShot: '💥', shield: '🛡️' };
    ctx.fillStyle = '#fff';
    ctx.font = `${CELL * 0.3}px Arial`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(labels[pu.type], px, py);
    ctx.globalAlpha = 1;
  }

  // Tanks
  for (const e of enemies) {
    if (e.hp > 0) drawTank(e);
  }
  if (player && player.hp > 0) {
    // Blink when invincible
    if (player.powerTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0) {
      ctx.globalAlpha = 0.5;
    }
    drawTank(player);
    ctx.globalAlpha = 1;
  }

  // Bullets
  for (const b of bullets) {
    const bx = b.x * CELL, by = b.y * CELL;
    ctx.fillStyle = b.isPlayer ? '#ff0' : '#f66';
    ctx.shadowColor = b.isPlayer ? '#ff0' : '#f66';
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(bx, by, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = p.color.replace(')', `,${alpha})`).replace('rgb', 'rgba');
    if (p.color.startsWith('#')) {
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
    }
    ctx.beginPath();
    ctx.arc(p.x * CELL, p.y * CELL, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// Game loop
let lastTime = 0;
function gameLoop(time) {
  const dt = lastTime ? time - lastTime : 16;
  lastTime = time;
  update(dt);
  render();
  gameLoopId = requestAnimationFrame(gameLoop);
}

function startGame() {
  initAudio();
  gameStarted = true;
  gameOver = false;
  score = 0;
  kills = 0;
  lives = 3;
  wave = 1;
  bullets = [];
  particles = [];
  enemies = [];
  powerUps = [];
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOver').style.display = 'none';
  generateMap();
  initPlayer();
  spawnWave();
  updateUI();
  lastTime = 0;
}

function restartGame() {
  score = 0;
  kills = 0;
  lives = 3;
  wave = 1;
  gameOver = false;
  gameStarted = true;
  bullets = [];
  particles = [];
  enemies = [];
  powerUps = [];
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOver').style.display = 'none';
  generateMap();
  initPlayer();
  spawnWave();
  updateUI();
  lastTime = 0;
}

// Init: start the render loop but wait for start screen
lastTime = 0;
gameLoopId = requestAnimationFrame(gameLoop);

// Handle window resize
window.addEventListener('resize', () => {
  const container = document.getElementById('gameContainer');
  const scale = Math.min(
    (window.innerWidth - 20) / canvas.width,
    (window.innerHeight - 20) / canvas.height,
    1.0
  );
  container.style.transform = `scale(${scale})`;
});
window.dispatchEvent(new Event('resize'));
</script>
